####################################################################################################
# Project-wide parameters
####################################################################################################

data_dir: 'DATA'
scratch: /lscratch                  # Temporary directory for HPC jobs
conda_source: myconda               # e.g. when running "source myconda" before activating conda environments
metadata:
    sample_libraries: AMP-AD_DiverseCohorts_assay_multiome_metadata.csv

####################################################################################################
# 01 and 02 - Synapse metadata + data retrieval
####################################################################################################
synapse:
    clobber: False                  # for metadata retrieval or actual file download
    datasets:
        - syn51753257   # metadata folder
        - syn53643818   # fastqs folder
    token: ~/.synapsetoken                      # Location of synapse authentication token
    metadata_summary: 'synapse-file-metadata.tsv'
    clobber: False
    slurm:
    conda_env: sysbio-sc
    modules: None
    


####################################################################################################
# 03 - Cellranger parameters
####################################################################################################
cellranger:
    clobber: False
    rerun_debug:  False            # force any single sample to be reran by itself, ignoring all other samples
    version: 10.1.0
    tool: count
    assay: Gene Expression
    transcriptome: /fdb/cellranger/refdata-gex-GRCh38-2024-A
    chemistry: ARC-v1
    slurm:
        conda_env: sysbio-sc
        modules:
            - cellranger/10.1.0
        array_limit: 50         # maximum number of concurrent jobs running
        mem: 64G                # Suggested: 64G
        partition: quick,norm        # Suggested: norm
        cpus:   8               # Suggested: 8
        walltime: '8:00:00'     # hours:min:sec, suggested: 8:00:00
        ntasks: 1
        gres:                   # other resource request
            lscratch:   400     # GB requested in local scratch


####################################################################################################
# 04 - Cellbender parameters
####################################################################################################
cellbender:
    clobber: False
    rerun_debug: False      # VR001-GEX
    version: 0.3.2
    slurm:
        conda_env: sysbio-sc
        modules:
            - cellbender/0.3.2
        array_limit: 50
        mem: 32G
        partition: gpu
        cpus: 1
        walltime: '3:00:00'
        ntasks: 1
        gres:
            lscratch: 50    # GB requested in local scratch
            gpu:a100: 1     # one a100 gpu

